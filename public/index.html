<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <button class="menu-btn" id="menuBtn" type="button" title="Toggle concepts" aria-label="Toggle concepts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
    <span class="dot"></span>Knowledge Agent
  </header>

  <div class="workspace" id="workspace">
    <div class="scrim" id="scrim"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title">Concepts</div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7" /><path stroke-linecap="round" d="M21 21l-4.3-4.3" />
        </svg>
        <input class="search-input" id="searchInput" type="text" placeholder="Search concepts…" autocomplete="off" />
      </div>
      <div class="concept-list" id="conceptList">
        <div class="sidebar-msg">Loading…</div>
      </div>
      <label class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".md,.txt" multiple />
        <span class="upload-label">↑ Upload file</span>
      </label>
    </aside>

    <main class="main">
      <div class="tab-bar">
        <button class="tab active" id="chatTab" type="button">
          <span class="label">Chat</span>
        </button>
        <button class="tab reading-tab" id="readingTab" type="button">
          <span class="label" id="readingTabLabel">Concept</span>
          <span class="close" id="readingTabClose" title="Close">×</span>
        </button>

        <div class="reading-actions" id="readingActions">
          <button class="icon-btn" id="editBtn" type="button" title="Edit concept">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z" />
            </svg>
            <span class="label-text">Edit</span>
          </button>
          <button class="icon-btn danger" id="deleteBtn" type="button" title="Delete concept">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
            </svg>
            <span class="label-text">Delete</span>
          </button>
        </div>

        <button class="clear-btn" id="clearBtn" type="button" title="Clear conversation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
          </svg>
          Clear
        </button>
      </div>

      <div class="views">
        <!-- Chat view — persistent, never destroyed -->
        <div class="view active" id="chatView">
          <div class="placeholder" id="chatPlaceholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
            </svg>
            <span>Ask a question about your knowledge base</span>
            <span class="hint">The agent browses your concepts and answers from them. Or pick a concept on the left to read it.</span>
          </div>
          <div class="chat-thread" id="chatThread" style="display:none"></div>
        </div>

        <!-- Reading view — shows an opened concept -->
        <div class="view" id="readingView">
          <div class="md" id="readingBody"></div>
        </div>
      </div>

      <div class="input-bar">
        <input id="queryInput" type="text" placeholder="Ask a question…" autocomplete="off" />
        <button id="sendBtn">Send</button>
      </div>
    </main>
  </div>

  <div class="toast-host" id="toastHost"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
