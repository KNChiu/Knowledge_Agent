<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:        #f7f8fa;
      --surface:   #ffffff;
      --border:    #e7e9ee;
      --border-strong: #d7dae1;
      --text:      #1a1d23;
      --text-soft: #5b616e;
      --text-mute: #9aa0ad;
      --accent:    #2563eb;
      --accent-dark: #1d4ed8;
      --accent-soft: #eef4ff;
      --danger:    #dc2626;
      --radius:    9px;
      --shadow:    0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
      --shadow-lg: 0 6px 24px rgba(16,24,40,.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    header {
      padding: 13px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-weight: 650;
      font-size: 15px;
      letter-spacing: .01em;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .workspace { flex: 1; display: flex; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────── */
    .sidebar {
      width: 232px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-title {
      padding: 14px 16px 9px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--text-mute);
    }

    .concept-list { flex: 1; overflow-y: auto; padding: 2px 8px 8px; }

    .concept-item {
      padding: 9px 11px;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: background .12s, border-color .12s;
      margin-bottom: 2px;
    }

    .concept-item:hover { background: var(--bg); }

    .concept-item.active {
      background: var(--accent-soft);
      border-color: #d6e2fb;
    }

    .concept-name {
      font-weight: 540;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .concept-type {
      font-size: 11px;
      color: var(--text-mute);
      margin-top: 2px;
      text-transform: lowercase;
    }

    .sidebar-msg { padding: 10px 14px; color: var(--text-mute); font-size: 12.5px; }
    .sidebar-msg.error { color: var(--danger); }

    /* Upload area */
    .upload-zone {
      margin: 8px;
      padding: 12px;
      border: 1.5px dashed var(--border-strong);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      color: var(--text-mute);
      font-size: 12.5px;
      transition: border-color .15s, background .15s, color .15s;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .upload-zone.uploading {
      border-color: #f59e0b;
      background: #fffbeb;
      color: #92400e;
      cursor: default;
    }

    .upload-zone input[type=file] { display: none; }

    /* ── Main panel ───────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }

    /* Tab bar — switch between Chat and an opened concept */
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 49px;
    }

    .tab {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 13px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 540;
      color: var(--text-soft);
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      transition: background .12s, color .12s;
      max-width: 280px;
    }

    .tab:hover { background: var(--bg); }

    .tab.active {
      background: var(--accent-soft);
      color: var(--accent-dark);
    }

    .tab .label {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .tab.reading-tab { display: none; }
    .tab.reading-tab.show { display: inline-flex; }

    .tab .close {
      display: inline-flex;
      width: 16px; height: 16px;
      align-items: center; justify-content: center;
      border-radius: 4px;
      font-size: 14px; line-height: 1;
      color: var(--text-mute);
    }
    .tab .close:hover { background: rgba(0,0,0,.07); color: var(--text); }

    .views { flex: 1; position: relative; overflow: hidden; }

    .view {
      position: absolute; inset: 0;
      overflow-y: auto;
      padding: 26px 30px;
      display: none;
    }
    .view.active { display: block; }

    /* Markdown rendering */
    .md h1 { font-size: 1.42em; margin: .2em 0 .55em; font-weight: 660; }
    .md h2 { font-size: 1.16em; margin: 1.1em 0 .4em; font-weight: 620; }
    .md h3 { font-size: 1.02em; margin: .85em 0 .3em; font-weight: 600; }
    .md p  { line-height: 1.68; margin-bottom: .72em; color: #2c313b; }
    .md ul, .md ol { margin: 0 0 .72em 1.3em; line-height: 1.68; }
    .md li { margin-bottom: .25em; }
    .md a { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md code { background: var(--bg); padding: 1.5px 5px; border-radius: 4px; font-size: .88em; }
    .md pre { background: var(--bg); padding: 13px 14px; border-radius: 8px; overflow-x: auto; margin-bottom: .72em; border: 1px solid var(--border); }
    .md pre code { background: none; padding: 0; }
    .md blockquote { border-left: 3px solid var(--border-strong); padding-left: 13px; color: var(--text-soft); margin-bottom: .72em; }
    .md table { border-collapse: collapse; margin-bottom: .72em; font-size: .94em; }
    .md th, .md td { border: 1px solid var(--border); padding: 6px 11px; text-align: left; }
    .md th { background: var(--bg); font-weight: 600; }

    /* Empty / placeholder */
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-mute);
      gap: 12px;
      text-align: center;
    }
    .placeholder svg { width: 42px; height: 42px; opacity: .35; }
    .placeholder .hint { font-size: 12.5px; color: var(--text-mute); max-width: 280px; line-height: 1.5; }

    /* Chat thread */
    .chat-thread { display: flex; flex-direction: column; gap: 18px; max-width: 760px; margin: 0 auto; }

    .chat-msg { display: flex; flex-direction: column; gap: 5px; animation: rise .18s ease; }
    @keyframes rise { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .chat-msg.user .bubble {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-radius: 15px 15px 3px 15px;
      padding: 9px 14px;
      max-width: 75%;
      line-height: 1.5;
      box-shadow: var(--shadow);
    }

    .chat-msg.agent .bubble {
      align-self: flex-start;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px 15px 15px 15px;
      padding: 10px 15px;
      max-width: 88%;
      line-height: 1.68;
    }

    .chat-msg.agent .bubble.error { background: #fef2f2; border-color: #fecaca; color: var(--danger); }
    .chat-msg.agent .bubble p:last-child { margin-bottom: 0; }

    /* Streaming caret */
    .bubble.streaming > :last-child::after {
      content: "";
      display: inline-block;
      width: 7px; height: 1.05em;
      vertical-align: text-bottom;
      margin-left: 2px;
      background: var(--accent);
      border-radius: 1px;
      animation: blink 1s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Tool activity line */
    .tool-line {
      font-size: 11.5px;
      color: var(--text-mute);
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 2px;
    }
    .tool-line svg { width: 13px; height: 13px; opacity: .7; }

    /* Thinking dots */
    .thinking { display: inline-flex; gap: 4px; padding: 3px 2px; }
    .thinking span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-mute);
      animation: bob 1.2s ease-in-out infinite;
    }
    .thinking span:nth-child(2) { animation-delay: .18s; }
    .thinking span:nth-child(3) { animation-delay: .36s; }
    @keyframes bob { 0%,80%,100% { opacity:.3; transform: translateY(0); } 40% { opacity:1; transform: translateY(-3px); } }

    /* Clear-conversation button */
    .clear-btn {
      margin-left: auto;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 11px;
      border-radius: 7px;
      font-size: 12.5px;
      font-weight: 540;
      color: var(--text-soft);
      background: transparent;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
    }
    .clear-btn.show { display: inline-flex; }
    .clear-btn:hover { background: #fef2f2; border-color: #fecaca; color: var(--danger); }
    .clear-btn svg { width: 13px; height: 13px; }

    /* ── Input bar ────────────────────────────── */
    .input-bar {
      border-top: 1px solid var(--border);
      padding: 13px 16px;
      display: flex;
      gap: 9px;
      flex-shrink: 0;
      max-width: 792px;
      width: 100%;
      margin: 0 auto;
    }

    .input-bar input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      font-size: 14px;
      outline: none;
      background: var(--surface);
      transition: border-color .15s, box-shadow .15s;
    }

    .input-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .input-bar button {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 560;
      cursor: pointer;
      transition: background .15s;
    }

    .input-bar button:hover:not(:disabled) { background: var(--accent-dark); }
    .input-bar button:disabled { background: #9cc0fb; cursor: not-allowed; }

    /* Toast */
    .toast-host {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 8px; z-index: 50; align-items: center;
    }
    .toast {
      background: #1f2430; color: #fff;
      padding: 10px 16px; border-radius: 9px;
      font-size: 13px; box-shadow: var(--shadow-lg);
      animation: rise .2s ease;
      max-width: 360px;
    }
    .toast.error { background: var(--danger); }
  </style>
</head>
<body>
  <header><span class="dot"></span>Knowledge Agent</header>

  <div class="workspace">
    <aside class="sidebar">
      <div class="sidebar-title">Concepts</div>
      <div class="concept-list" id="conceptList">
        <div class="sidebar-msg">Loading…</div>
      </div>
      <label class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".md,.txt" multiple />
        <span class="upload-label">↑ Upload file</span>
      </label>
    </aside>

    <main class="main">
      <div class="tab-bar">
        <button class="tab active" id="chatTab" type="button">
          <span class="label">Chat</span>
        </button>
        <button class="tab reading-tab" id="readingTab" type="button">
          <span class="label" id="readingTabLabel">Concept</span>
          <span class="close" id="readingTabClose" title="Close">×</span>
        </button>
        <button class="clear-btn" id="clearBtn" type="button" title="Clear conversation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
          </svg>
          Clear
        </button>
      </div>

      <div class="views">
        <!-- Chat view — persistent, never destroyed -->
        <div class="view active" id="chatView">
          <div class="placeholder" id="chatPlaceholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
            </svg>
            <span>Ask a question about your knowledge base</span>
            <span class="hint">The agent browses your concepts and answers from them. Or pick a concept on the left to read it.</span>
          </div>
          <div class="chat-thread" id="chatThread" style="display:none"></div>
        </div>

        <!-- Reading view — shows an opened concept -->
        <div class="view" id="readingView">
          <div class="md" id="readingBody"></div>
        </div>
      </div>

      <div class="input-bar">
        <input id="queryInput" type="text" placeholder="Ask a question…" autocomplete="off" />
        <button id="sendBtn">Send</button>
      </div>
    </main>
  </div>

  <div class="toast-host" id="toastHost"></div>

  <script>
    const conceptList = document.getElementById('conceptList');
    const chatView    = document.getElementById('chatView');
    const readingView = document.getElementById('readingView');
    const chatThread  = document.getElementById('chatThread');
    const chatPlaceholder = document.getElementById('chatPlaceholder');
    const readingBody = document.getElementById('readingBody');
    const queryInput  = document.getElementById('queryInput');
    const sendBtn     = document.getElementById('sendBtn');
    const chatTab     = document.getElementById('chatTab');
    const readingTab  = document.getElementById('readingTab');
    const readingTabLabel = document.getElementById('readingTabLabel');
    const readingTabClose = document.getElementById('readingTabClose');
    const clearBtn    = document.getElementById('clearBtn');
    const toastHost   = document.getElementById('toastHost');

    let activeItem = null;

    // Friendly labels for the tools the agent reports via SSE.
    const TOOL_LABELS = {
      list_concepts: 'Browsing the knowledge base',
      read_concept:  'Reading a concept',
      write_concept: 'Saving a concept',
    };

    const ACTIVITY_ICON =
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
      '<path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h10"/></svg>';

    // ── View switching ─────────────────────────
    function showChat() {
      chatView.classList.add('active');
      readingView.classList.remove('active');
      chatTab.classList.add('active');
      readingTab.classList.remove('active');
      if (activeItem) { activeItem.classList.remove('active'); activeItem = null; }
    }

    function showReading() {
      readingView.classList.add('active');
      chatView.classList.remove('active');
      readingTab.classList.add('active');
      chatTab.classList.remove('active');
    }

    chatTab.addEventListener('click', showChat);
    readingTab.addEventListener('click', () => { if (readingTab.classList.contains('show')) showReading(); });
    readingTabClose.addEventListener('click', (e) => {
      e.stopPropagation();
      readingTab.classList.remove('show');
      showChat();
    });

    // ── Toast ──────────────────────────────────
    function toast(message, kind = '') {
      const el = document.createElement('div');
      el.className = `toast ${kind}`;
      el.textContent = message;
      toastHost.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    // ── Load concept list ──────────────────────
    async function loadConcepts() {
      try {
        const res = await fetch('/api/concepts');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const concepts = await res.json();
        conceptList.innerHTML = '';

        if (!concepts.length) {
          conceptList.innerHTML = '<div class="sidebar-msg">No concepts yet. Upload a file to start.</div>';
          return;
        }

        for (const c of concepts) {
          const el = document.createElement('div');
          el.className = 'concept-item';
          el.innerHTML = `
            <div class="concept-name">${escapeHtml(c.name ?? c.path)}</div>
            <div class="concept-type">${escapeHtml(c.type ?? '')}</div>`;
          el.dataset.file = c.path;
          el.addEventListener('click', () => openConcept(c.path, el));
          conceptList.appendChild(el);
        }
      } catch (err) {
        conceptList.innerHTML = `<div class="sidebar-msg error">Couldn't load concepts: ${escapeHtml(err.message)}</div>`;
      }
    }

    // ── Open a concept (into the reading view) ──
    async function openConcept(file, el) {
      if (activeItem) activeItem.classList.remove('active');
      el.classList.add('active');
      activeItem = el;

      const title = el.querySelector('.concept-name')?.textContent ?? file;
      readingTabLabel.textContent = title;
      readingTabLabel.title = title;
      readingTab.classList.add('show');
      showReading();

      readingBody.innerHTML = '<div class="placeholder"><span>Loading…</span></div>';
      try {
        const res = await fetch(`/api/concepts/${encodeURIComponent(file)}`);
        if (!res.ok) {
          const { error } = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
          throw new Error(error);
        }
        const { content } = await res.json();
        // Strip the YAML frontmatter before rendering
        const body = content.replace(/^---[\s\S]*?---\r?\n?/, '');
        readingBody.innerHTML = marked.parse(body);
      } catch (err) {
        readingBody.innerHTML = `<div class="placeholder"><span style="color:var(--danger)">${escapeHtml(err.message)}</span></div>`;
      }
    }

    // ── Chat ───────────────────────────────────
    function ensureThread() {
      if (chatThread.style.display === 'none') {
        chatPlaceholder.style.display = 'none';
        chatThread.style.display = '';
        clearBtn.classList.add('show');
      }
    }

    function clearConversation() {
      chatThread.innerHTML = '';
      chatThread.style.display = 'none';
      chatPlaceholder.style.display = '';
      clearBtn.classList.remove('show');
      showChat();
      queryInput.focus();
    }

    clearBtn.addEventListener('click', clearConversation);

    function appendMessage(role, html, tools = []) {
      ensureThread();
      const msg = document.createElement('div');
      msg.className = `chat-msg ${role}`;

      for (const t of tools) {
        const line = document.createElement('div');
        line.className = 'tool-line';
        line.innerHTML = `${ACTIVITY_ICON}<span></span>`;
        line.querySelector('span').textContent = TOOL_LABELS[t] ?? t;
        msg.appendChild(line);
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = html;
      msg.appendChild(bubble);

      chatThread.appendChild(msg);
      chatView.scrollTop = chatView.scrollHeight;
      return bubble;
    }

    function appendThinking() {
      ensureThread();
      const msg = document.createElement('div');
      msg.className = 'chat-msg agent';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
      msg.appendChild(bubble);
      chatThread.appendChild(msg);
      chatView.scrollTop = chatView.scrollHeight;
      return msg;
    }

    async function sendQuery() {
      const query = queryInput.value.trim();
      if (!query) return;

      showChat();
      queryInput.value = '';
      sendBtn.disabled = true;

      appendMessage('user', escapeHtml(query));

      const toolCalls = [];
      let pending = appendThinking();   // thinking indicator until first token
      let bubble = null;
      let rawText = '';

      const finish = () => {
        if (bubble) bubble.classList.remove('streaming');
        if (pending) { pending.remove(); pending = null; }
        sendBtn.disabled = false;
        queryInput.focus();
      };

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query }),
        });
        if (!res.ok || !res.body) throw new Error(`HTTP ${res.status}`);

        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });

          const parts = buf.split('\n\n');
          buf = parts.pop() ?? '';

          for (const part of parts) {
            const eventMatch = part.match(/^event: (\w+)/m);
            const dataMatch  = part.match(/^data: (.*)/m);
            if (!eventMatch || !dataMatch) continue;

            const event = eventMatch[1];
            const data  = JSON.parse(dataMatch[1]);

            if (event === 'tool') {
              toolCalls.push(data);
              // Surface activity on the pending bubble while we wait.
              if (pending && !bubble) {
                pending.querySelector('.bubble').innerHTML =
                  `<div class="tool-line">${ACTIVITY_ICON}<span></span></div>` +
                  '<div class="thinking" style="margin-top:6px"><span></span><span></span><span></span></div>';
                pending.querySelector('.tool-line span').textContent = TOOL_LABELS[data] ?? data;
              }
            } else if (event === 'text') {
              rawText += data;
              if (!bubble) {
                if (pending) { pending.remove(); pending = null; }
                bubble = appendMessage('agent', '', toolCalls.splice(0));
                bubble.classList.add('streaming');
              }
              bubble.innerHTML = marked.parse(rawText);
              bubble.classList.add('streaming');
              chatView.scrollTop = chatView.scrollHeight;
            } else if (event === 'error') {
              if (pending) { pending.remove(); pending = null; }
              const b = appendMessage('agent', '', toolCalls.splice(0));
              b.classList.add('error');
              b.textContent = `Error: ${data}`;
            }
          }
        }
        finish();
      } catch (err) {
        if (pending) { pending.remove(); pending = null; }
        const b = appendMessage('agent', '');
        b.classList.add('error');
        b.textContent = `Request failed: ${err.message}`;
        finish();
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Event bindings ─────────────────────────
    sendBtn.addEventListener('click', sendQuery);
    queryInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
    });

    // ── File upload ────────────────────────────
    const uploadZone  = document.getElementById('uploadZone');
    const fileInput   = document.getElementById('fileInput');
    const uploadLabel = uploadZone.querySelector('.upload-label');

    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });

    async function handleFiles(files) {
      if (!files || files.length === 0) return;
      uploadZone.classList.add('uploading');

      for (const file of Array.from(files)) {
        uploadLabel.textContent = `Uploading ${file.name}…`;
        const fd = new FormData();
        fd.append('file', file);
        try {
          const res = await fetch('/api/upload', { method: 'POST', body: fd });
          const data = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
          if (!res.ok) throw new Error(data.error ?? 'Upload failed');
          await loadConcepts();
          const items = conceptList.querySelectorAll('.concept-item');
          for (const item of items) {
            if (item.dataset.file === data.file) { item.click(); break; }
          }
          toast(`Saved “${data.file}”`);
        } catch (err) {
          toast(`Upload failed: ${err.message}`, 'error');
        }
      }

      uploadZone.classList.remove('uploading');
      uploadLabel.textContent = '↑ Upload file';
      fileInput.value = '';
    }

    loadConcepts();
  </script>
</body>
</html>
